name: Update Coding Stats

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch LeetCode stats manually
        run: |
          echo "Fetching LeetCode stats..."
          
          # Simple API call
          curl -s "https://leetcode-stats-api.herokuapp.com/Bppatkar" > leetcode.json
          
          # Check if we got valid data
          if grep -q "totalSolved" leetcode.json; then
            echo "✅ LeetCode API working"
            cat leetcode.json
          else
            echo "⚠️ API failed, using manual update"
            # Manual update - sirf timestamp change karo
            node -e "
            const fs = require('fs');
            const stats = JSON.parse(fs.readFileSync('public/stats.json'));
            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('public/stats.json', JSON.stringify(stats, null, 2));
            "
            exit 0
          fi
          
          # Parse and update stats.json
          node -e "
          const fs = require('fs');
          const leetcode = JSON.parse(fs.readFileSync('leetcode.json'));
          const stats = JSON.parse(fs.readFileSync('public/stats.json'));
          
          // Update LeetCode stats
          stats.leetcode = {
            solved: leetcode.totalSolved || 86,
            easy: leetcode.easySolved || 55,
            medium: leetcode.mediumSolved || 30,
            hard: leetcode.hardSolved || 1,
            ranking: leetcode.ranking || 1524619
          };
          
          stats.lastUpdated = new Date().toISOString();
          
          fs.writeFileSync('public/stats.json', JSON.stringify(stats, null, 2));
          console.log('✅ stats.json updated with new LeetCode data');
          "

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/stats.json
          
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update coding stats"
            git push
            echo "✅ Pushed!"
          fi