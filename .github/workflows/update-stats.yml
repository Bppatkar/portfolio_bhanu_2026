name: Update Coding Stats

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update stats.json with current timestamp
        run: |
          # Current stats.json read karo aur timestamp update karo
          node -e "
          const fs = require('fs');
          const path = 'public/stats.json';

          // Check if file exists
          if (!fs.existsSync(path)) {
            console.error('❌ stats.json not found!');
            process.exit(1);
          }

          // Read and update
          const stats = JSON.parse(fs.readFileSync(path));
          stats.lastUpdated = new Date().toISOString();
          fs.writeFileSync(path, JSON.stringify(stats, null, 2));
          console.log('✅ stats.json updated:', stats.lastUpdated);
          "

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/stats.json

          if git diff --staged --quiet; then
            echo "ℹ️ No changes"
          else
            git commit -m "Update coding stats timestamp"
            git push
            echo "✅ Pushed!"
          fi
